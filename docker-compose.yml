services:
  ocr-bench:
    build: .
    container_name: ocr-benchmark
    ports:
      - "8766:8765"
    volumes:
      - ./IMG_OCR_IND_CN:/app/IMG_OCR_IND_CN:ro
      - ./dataset:/app/dataset:ro
      - ocr-reports:/app/reports
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  ocr-reports:
